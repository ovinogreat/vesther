<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vesther Investment Properties Ltd</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#fff;
    color:#222;
}

.interest-form{
    margin-top:-40px;
    background:#fff;
    padding:-25px;
    border-radius:15px;
    border:1px solid #eee;
}

.interest-form h3{
    margin-bottom:10px;
    color:#111;
}

.interest-form p{
    margin-bottom:10px;
    font-size:14px;
}

.interest-form form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.interest-form input,
.interest-form select{
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.interest-form input:focus,
.interest-form select:focus{
    outline:none;
    border-color:#ff6600;
}

.interest-form button{
    background:linear-gradient(90deg,#ff4d00,#ff8a00);
    color:#fff;
    border:none;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:16px;
}

.hero{
    min-height:100vh;
    background-image:url("./images/banner.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.content{
    position:relative;
    z-index:2;
    max-width:1200px;
    margin:auto;
    padding:120px 30px;
    display:flex;
    align-items:center;
    height:100vh;
}

.btn{
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,102,0,.35);
}
.card{
    max-width:500px;
     background:rgba(255,255,255,.88);
   backdrop-filter:blur(1px);
    padding:50px;
    border-radius:20px;
    box-shadow:0 15px 50px rgba(0,0,0,.2);
}

.badge{
    display:inline-block;
    background:linear-gradient(90deg,#ff4d00,#ff8a00);
    color:#fff;
    padding:10px 20px;
    border-radius:50px;
    font-size:14px;
    margin-bottom:20px;
}

h1{
    font-size:70px;
    line-height:1;
    margin-bottom:20px;
}

.orange{
    color:#ff5a00;
}

p{
    font-size:18px;
    color:#555;
    line-height:1.8;
}



.box{
    width:90px;
    height:90px;
    background:#111;
    color:#fff;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.box span:first-child{
    font-size:28px;
    font-weight:700;
}

.contact{
    margin-top:35px;
    border-top:1px solid #ddd;
    padding-top:25px;
}

.contact p{
    margin-bottom:8px;
}

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    background:#fff;
    width:90%;
    max-width:450px;
    padding:30px;
    border-radius:20px;
    position:relative;
    animation:popup .3s ease;
}

@keyframes popup{
    from{
        transform:translateY(20px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.close-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#f3f3f3;
    cursor:pointer;
    font-size:18px;
}

.popup-box h2{
    margin-bottom:10px;
}

.popup-box p{
    margin-bottom:20px;
    color:#666;
}

.popup-box form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.popup-box input,
.popup-box select{
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
}

.submit-btn{
    background:linear-gradient(90deg,#ff4d00,#ff8a00);
    color:#fff;
    border:none;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}
.btn{
    display:inline-block;
    margin-top:25px;
    padding:15px 35px;
    background:linear-gradient(90deg,#ff4d00,#ff8a00);
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-weight:600;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
    color:#fff;
}

@media(max-width:768px){

h1{
    font-size:50px;
}

.card{
    padding:30px;
}

.content{
    padding:40px 20px;
}



}
</style>
</head>


<body>

<div class="content">

<div class="card">

<div class="badge">
🚧 SITE UNDER MAINTAINANCE
</div>

<div class="contact">

</div>

</div>

</div>

</footer>


<script>

window.onload = function(){

    setTimeout(function(){

        if(!localStorage.getItem("vestherPopupClosed")){
            document.getElementById("leadPopup").style.display="flex";
        }

    },3000);

};

function closePopup(){

    document.getElementById("leadPopup").style.display="none";

    localStorage.setItem("vestherPopupClosed","true");

}


</script>

</body>
</html>
